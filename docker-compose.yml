services:
  mongo:
    image: mongo:7
    container_name: mandirledger-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mandirledger-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/mandirledger
      - CORS_ORIGIN=http://localhost:3000
      - TEMPLE_NAME=Shri Mandir
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mandirledger-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
      - NEXT_PUBLIC_TEMPLE_NAME=Shri Mandir
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
